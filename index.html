<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    position: relative;
    z-index: 2;
}

h1, p {
    color: white;
}

.btn {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    margin: 10px;
}

#yesBtn {
    background: #ff4b5c;
    color: white;
}

#noBtn {
    position: fixed;
    background: white;
    color: #ff4b5c;
}

.love-msg {
    display: none;
    font-size: 1.8rem;
    color: white;
    margin-top: 20px;
}

/* 🎈 Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 30px;
    height: 40px;
    background: red;
    border-radius: 50%;
    animation: rise 6s linear infinite;
}

@keyframes rise {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
}

/* 💓 Hearts */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* 🎉 Confetti */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: yellow;
    animation: fall 3s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Khushi, Do you know what makes my world feel complete? It’s you… ❤️</h1>
    <p>so will you be mine forever?  </p>

    <button id="yesBtn" class="btn">Yes 💖</button>
    <button id="noBtn" class="btn">No 😢</button>

    <div id="loveMsg" class="love-msg">
        I knew it… but hearing it still feels like the most beautiful thing in my life. I love you so much ❤️
        <p> 

            From this moment, it’s not just ‘me’ anymore… it’s ‘us’. And I’ll protect this ‘us’ forever.
        </p>
    </div>
</div>

<!-- 🔊 Sound -->
<audio id="loveSound" src="https://www.fesliyanstudios.com/play-mp3/387" preload="auto"></audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const loveMsg = document.getElementById("loveMsg");
const sound = document.getElementById("loveSound");

// Move NO button safely
function moveNoButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth - 10;
    const maxY = window.innerHeight - noBtn.offsetHeight - 10;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("touchstart", e => { e.preventDefault(); moveNoButton(); });
noBtn.addEventListener("touchmove", moveNoButton);
noBtn.addEventListener("click", e => { e.preventDefault(); moveNoButton(); });

// YES click → celebration
yesBtn.addEventListener("click", () => {
    loveMsg.style.display = "block";
    sound.play();

    // 🎈 Balloons
    for (let i = 0; i < 20; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "vw";
        b.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
        b.style.animationDuration = (4 + Math.random()*3) + "s";
        document.body.appendChild(b);
    }

    // 💓 Hearts
    for (let i = 0; i < 30; i++) {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "❤️";
        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (15 + Math.random()*25) + "px";
        document.body.appendChild(h);
    }

    // 🎉 Confetti
    for (let i = 0; i < 40; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
        document.body.appendChild(c);
    }
});
</script>

</body>
</html>
